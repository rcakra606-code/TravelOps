<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout | TravelOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0; min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: linear-gradient(180deg, #0b1e3d 0%, #1a3a5c 30%, #2d6a8a 50%, #d4944c 75%, #1a1a2e 100%);
    }

    .bg-photo {
      position: fixed; inset: 0; z-index: 0;
      background:
        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80') center/cover no-repeat,
        linear-gradient(180deg, #0b1e3d 0%, #1a3a5c 30%, #2d6a8a 50%, #d4944c 75%, #1a1a2e 100%);
      filter: brightness(0.6);
    }

    .logout-title {
      position: relative; z-index: 2;
      text-align: center;
      color: #fff;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      animation: fadeDown 0.7s ease-out;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logout-card {
      position: relative; z-index: 2;
      width: 460px; max-width: 92vw;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 44px 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
      animation: cardUp 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes cardUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .wave-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #d4a843, #b8922e);
      border-radius: 50%;
      font-size: 2.4rem;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(212,168,67,0.35);
      animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }

    .card-heading {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .card-message {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .timer-bar {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 14px 20px;
      margin-bottom: 24px;
      animation: slideUp 0.6s ease 0.5s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: #d4a843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .timer-text {
      color: rgba(255,255,255,0.8);
      font-size: 0.88rem;
      font-weight: 500;
    }

    .timer-text .countdown {
      font-weight: 700;
      color: #d4a843;
    }

    .login-now-btn {
      display: inline-block;
      padding: 12px 36px;
      background: linear-gradient(135deg, #d4a843, #b8922e);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .login-now-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212,168,67,0.4);
    }
    .login-now-btn:active { transform: translateY(0); }
    .login-now-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }
    .login-now-btn:hover::before { left: 100%; }

    .logout-footer {
      position: relative; z-index: 2;
      margin-top: 40px;
      color: rgba(255,255,255,0.4);
      font-size: 0.78rem;
      text-align: center;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .logout-title { font-size: 1.6rem; letter-spacing: 4px; }
      .logout-card { padding: 36px 24px 28px; }
      .wave-icon { width: 64px; height: 64px; font-size: 2rem; }
      .card-heading { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div class="bg-photo"></div>

  <h1 class="logout-title">TravelOps</h1>

  <div class="logout-card">
    <div class="wave-icon">👋</div>
    <div class="card-heading">See You Soon!</div>
    <p class="card-message">Thank you for using TravelOps.<br>You have been logged out successfully.</p>

    <div class="timer-bar">
      <div class="spinner"></div>
      <span class="timer-text" id="redirectMessage">Redirecting in <span class="countdown" id="countdown">5</span> seconds…</span>
    </div>

    <a href="/login.html" class="login-now-btn">Login Now</a>
  </div>

  <div class="logout-footer">
    &copy; 2026 TravelOps. All Rights Reserved | Tour Sales Management System
  </div>

  <script>
    // Clear authentication data
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('sessionId');
    localStorage.removeItem('travelops-theme');
    sessionStorage.clear();

    // Countdown timer
    let seconds = 5;
    const messageEl = document.getElementById('redirectMessage');

    const msgs = [
      'Redirecting in <span class="countdown">5</span> seconds…',
      'Redirecting in <span class="countdown">4</span> seconds…',
      'Redirecting in <span class="countdown">3</span> seconds…',
      'Almost there… <span class="countdown">2</span>',
      'Redirecting now… <span class="countdown">1</span>',
      '🚀 Taking you to login…'
    ];

    const timer = setInterval(() => {
      seconds--;
      if (seconds >= 0) messageEl.innerHTML = msgs[5 - seconds];
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = '/login.html';
      }
    }, 1000);
  </script>
</body>
</html>
