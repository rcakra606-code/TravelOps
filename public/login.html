<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TravelOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/seasonal-theme.css">
  <script src="/js/toast.js" defer></script>
  <script src="/js/seasonal-theme.js" defer></script>
  <script src="/js/login.js" defer></script>
  <link rel="stylesheet" href="/css/app-v2.css">
  <link rel="stylesheet" href="/css/futuristic-theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0; min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      /* Sunset-sky gradient as fallback when no image loads */
      background: linear-gradient(180deg, #0b1e3d 0%, #1a3a5c 30%, #2d6a8a 50%, #d4944c 75%, #1a1a2e 100%);
      background-size: cover;
    }

    /* Full-screen background image */
    .bg-photo {
      position: fixed; inset: 0; z-index: 0;
      background:
        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80') center/cover no-repeat,
        linear-gradient(180deg, #0b1e3d 0%, #1a3a5c 30%, #2d6a8a 50%, #d4944c 75%, #1a1a2e 100%);
      filter: brightness(0.65);
    }

    /* Title above the card */
    .login-title {
      position: relative; z-index: 2;
      text-align: center;
      color: #fff;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      animation: fadeDown 0.7s ease-out;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glass card */
    .login-card {
      position: relative; z-index: 2;
      width: 420px; max-width: 92vw;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: cardUp 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes cardUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-heading {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    /* Input rows with golden labels */
    .field-row {
      display: flex;
      align-items: stretch;
      margin-bottom: 20px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .field-label {
      display: flex; align-items: center; justify-content: center;
      padding: 0 18px;
      background: linear-gradient(135deg, #d4a843, #b8922e);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      min-width: 110px;
    }

    .field-row input {
      flex: 1;
      padding: 14px 16px;
      border: none;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #1e293b;
      background: rgba(255,255,255,0.92);
      outline: none;
      transition: background 0.2s;
    }
    .field-row input::placeholder { color: #94a3b8; font-weight: 400; }
    .field-row input:focus { background: #fff; }

    .pw-toggle {
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px;
      background: rgba(255,255,255,0.92);
      border: none; cursor: pointer;
      font-size: 1.15rem; color: #94a3b8;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: #475569; }

    /* Remember me + Forgot password row */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; color: rgba(255,255,255,0.8);
      font-size: 0.85rem; font-weight: 500;
    }
    .remember-label input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #d4a843;
      cursor: pointer;
    }

    .forgot-link {
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #fff; }

    /* Login button */
    .login-btn {
      float: right;
      padding: 12px 36px;
      background: linear-gradient(135deg, #1e293b, #334155);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, #334155, #475569);
    }
    .login-btn:active { transform: translateY(0); }
    .login-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .login-btn:hover::before { left: 100%; }

    /* Error message */
    .error-msg {
      display: none;
      clear: both;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 6px;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      animation: shake 0.4s ease;
    }
    .error-msg::before { content: '⚠️ '; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Footer */
    .login-footer {
      position: relative; z-index: 2;
      margin-top: 40px;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* Loading state */
    .loading { pointer-events: none; }
    .loading .login-btn {
      background: linear-gradient(135deg, #64748b, #475569);
    }
    .loading .login-btn::after {
      content: '';
      position: absolute; right: 14px; top: 50%;
      width: 18px; height: 18px; margin-top: -9px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 480px) {
      .login-title { font-size: 1.6rem; letter-spacing: 4px; }
      .login-card { padding: 32px 24px 28px; }
      .field-label { min-width: 90px; font-size: 0.76rem; padding: 0 12px; }
      .login-btn { padding: 10px 28px; }
    }
  </style>
</head>
<body>
  <!-- Full-screen background photo -->
  <div class="bg-photo"></div>

  <!-- Title above the card -->
  <h1 class="login-title">TravelOps Login</h1>

  <!-- Glass card -->
  <div class="login-card">
    <div class="card-heading">Login Now</div>

    <form id="loginForm">
      <!-- Username -->
      <div class="field-row">
        <span class="field-label">Username:</span>
        <input type="text" id="username" placeholder="Enter your username" required autofocus autocomplete="username" />
      </div>

      <!-- Password -->
      <div class="field-row">
        <span class="field-label">Password:</span>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">👁️</button>
      </div>

      <!-- Options row -->
      <div class="options-row">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe" />
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot Password</a>
      </div>

      <!-- Login button -->
      <button type="submit" class="login-btn">Login</button>

      <div id="errorMsg" class="error-msg">Invalid username or password.</div>
    </form>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    &copy; 2026 TravelOps. All Rights Reserved | Tour Sales Management System
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('pwToggle').addEventListener('click', function() {
      const pw = document.getElementById('password');
      if (pw.type === 'password') {
        pw.type = 'text';
        this.textContent = '🙈';
      } else {
        pw.type = 'password';
        this.textContent = '👁️';
      }
    });
    
    // Show device conflict dialog
    function showDeviceConflictDialog(deviceInfo) {
      const overlay = document.createElement('div');
      overlay.id = 'deviceConflictOverlay';
      overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      `;
      
      const loginTime = deviceInfo?.loginTime ? new Date(deviceInfo.loginTime).toLocaleString() : 'Unknown time';
      
      overlay.innerHTML = `
        <div style="background: white; padding: 32px; border-radius: 16px; max-width: 450px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.3);">
          <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
          <h3 style="margin: 0 0 12px 0; color: #dc2626; font-size: 20px;">Account Already Active</h3>
          <p style="margin: 0 0 16px 0; color: #374151; font-size: 15px; line-height: 1.5;">
            This account is currently logged in on another device.
          </p>
          <div style="background: #f8fafc; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; text-align: left;">
            <p style="margin: 0 0 4px 0; font-size: 13px; color: #6b7280;">Login time: <strong>${loginTime}</strong></p>
            ${deviceInfo?.ip ? `<p style="margin: 0; font-size: 13px; color: #6b7280;">IP: <strong>${deviceInfo.ip}</strong></p>` : ''}
          </div>
          <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 13px;">
            Do you want to terminate that session and login here instead?
          </p>
          <div style="display: flex; gap: 12px; justify-content: center;">
            <button id="cancelLoginBtn" style="background: #e5e7eb; color: #374151; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600;">
              Cancel
            </button>
            <button id="forceLoginBtn" style="background: #dc2626; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600;">
              Login Here
            </button>
          </div>
        </div>
      `;
      
      document.body.appendChild(overlay);
      
      document.getElementById('cancelLoginBtn').onclick = () => overlay.remove();
      document.getElementById('forceLoginBtn').onclick = async () => {
        overlay.remove();
        await doLogin(true); // Force login
      };
    }
    
    // Handle login
    async function doLogin(forceLogin = false) {
      const form = document.getElementById('loginForm');
      const errorMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      form.classList.add('loading');
      errorMsg.style.display = 'none';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, forceLogin })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Success - store token and redirect
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify({
            id: data.id,
            username: data.username,
            name: data.name,
            email: data.email,
            type: data.type
          }));
          if (data.sessionId) {
            localStorage.setItem('sessionId', data.sessionId);
          }
          
          // Fetch CSRF token before navigating
          try {
            const csrfRes = await fetch('/api/csrf-token', {
              headers: { 'Authorization': 'Bearer ' + data.token }
            });
            if (csrfRes.ok) {
              const csrfData = await csrfRes.json();
              if (csrfData.csrfToken) sessionStorage.setItem('csrfToken', csrfData.csrfToken);
            }
          } catch (e) { /* non-fatal */ }
          
          window.location.href = '/single-dashboard.html';
          return;
        }
        
        // Handle different error cases
        if (response.status === 409 && data.code === 'ALREADY_LOGGED_IN') {
          // Device conflict - show dialog
          form.classList.remove('loading');
          showDeviceConflictDialog(data.deviceInfo);
          return;
        }
        
        // Other errors
        errorMsg.textContent = data.error || 'Login failed. Please try again.';
        errorMsg.style.display = 'block';
        
      } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = 'Network error. Please check your connection.';
        errorMsg.style.display = 'block';
      }
      
      form.classList.remove('loading');
    }
    
    // Form submit handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await doLogin(false);
    });
    
    // Clear any stale session data on login page load
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    localStorage.removeItem('sessionId');
  </script>
</body>
</html>
